#ring{position:fixed;z-index:9998;pointer-events:none;width:34px;height:34px;border:1px solid rgba(0,220,255,.38);border-radius:50%;transform:translate(-50%,-50%);transition:all .16s}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes scanH{0%{top:0}100%{top:100%}}

@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.6)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.glass::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c1),transparent);animation:scanH 6s linear infinite;pointer-events:none}
.glass:hover{border-color:rgba(0,220,255,.28);box-shadow:0 4px 32px rgba(0,220,255,.07)}
.term{background:rgba(5,8,15,.97);border:1px solid var(--b1);position:relative;overflow:hidden}
.term::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c1),transparent);animation:scanH 6s linear infinite;pointer-events:none;z-index:2}
.tbar{background:rgba(5,8,15,.9);border-bottom:1px solid var(--b2);padding:.45rem 1rem;display:flex;align-items:center;gap:.38rem;flex-shrink:0}
.tdot{width:9px;height:9px;border-radius:50%}

function useCursor(){
  useEffect(()=>{
    const dot=document.getElementById("dot"),ring=document.getElementById("ring");
    let rx=0,ry=0,mx=600,my=400,af;
    const lerp=(a,b,t)=>a+(b-a)*t;
    const mv=e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+"px";dot.style.top=my+"px";};
    const loop=()=>{rx=lerp(rx,mx,.13);ry=lerp(ry,my,.13);ring.style.left=rx+"px";ring.style.top=ry+"px";af=requestAnimationFrame(loop);};
    window.addEventListener("mousemove",mv);loop();
    return()=>{window.removeEventListener("mousemove",mv);cancelAnimationFrame(af);};
  },[]);
}

/* ══════════════════════ MATRIX RAIN CANVAS ══════════════════════ */
function MatrixCanvas(){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const ctx=cv.getContext("2d");
    const resize=()=>{cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;};
    resize();
    const ro=new ResizeObserver(resize);ro.observe(cv);
    const chars="01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ<>{}[]|/\\#@$%^&*";
    const fs=14;
    let cols=Math.floor(cv.width/fs);
    let drops=Array(cols).fill(1).map(()=>Math.random()*-100);
    let af;
    const draw=()=>{
      ctx.fillStyle="rgba(5,8,15,.22)";
      ctx.fillRect(0,0,cv.width,cv.height);
      cols=Math.floor(cv.width/fs);
      while(drops.length<cols)drops.push(Math.random()*-100);
      drops.length=cols;
      for(let i=0;i<cols;i++){
        const c=chars[Math.floor(Math.random()*chars.length)];
        const bright=Math.random()>.92;
        ctx.fillStyle=bright?"rgba(200,255,255,.9)":i%3===0?"rgba(0,220,255,.55)":"rgba(0,220,255,.18)";
        ctx.font=fs+"px 'Fira Code',monospace";
        ctx.fillText(c,i*fs,drops[i]*fs);
        if(drops[i]*fs>cv.height&&Math.random()>.975)drops[i]=0;
        drops[i]+=.55;
      }
      af=requestAnimationFrame(draw);
    };
    draw();
    return()=>{cancelAnimationFrame(af);ro.disconnect();};
  },[]);
  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",zIndex:0,pointerEvents:"none",opacity:.35}}/>;
}

/* ══════════════════════ REVEAL ══════════════════════ */
function useReveal(thresh=.07){
  const ref=useRef(null);const[vis,setVis]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);o.disconnect();}},{threshold:thresh});
    o.observe(el);return()=>o.disconnect();
  },[]);
  return[ref,vis];
}

                <div style={{fontFamily:"var(--fH)",fontWeight:700,fontSize:".78rem",color:"var(--t1)",letterSpacing:".03em",marginBottom:".2rem"}}>{c.n}</div>
                <div style={{fontFamily:"var(--fM)",fontSize:".6rem",color:"var(--t3)"}}>{c.by}</div>
              </div>
              <span style={{fontFamily:"var(--fM)",fontSize:".6rem",color:c.col,flexShrink:0}}>{c.yr}</span>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ══════════════════════ CONTACT — Web3Forms (no mail client) ══════════════════════ */
function Contact(){
  const[ref,vis]=useReveal();
  const[form,setForm]=useState({name:"",email:"",subject:"",message:""});
  const[status,setStatus]=useState("idle"); 
  // idle | sending | sent | error
  const inp={width:"100%",background:"var(--bg)",border:"1px solid var(--b1)",padding:".72rem 1rem",color:"var(--t1)",fontFamily:"var(--fM)",fontSize:".74rem",outline:"none",transition:"border-color .2s",borderRadius:0,letterSpacing:".02em"};

  const send=async()=>{
    if(!form.name||!form.email||!form.message)return;
    setStatus("sending");
    try{
      const res=await fetch("https://api.web3forms.com/submit",{
        method:"POST",
        headers:{"Content-Type":"application/json","Accept":"application/json"},
        body:JSON.stringify({
          access_key:WEB3FORMS_KEY,
          name:form.name,
          email:form.email,
          subject:form.subject||"Portfolio Contact from "+form.name,
          message:form.message,
        }),
      });
      const data=await res.json();
      if(data.success){
        setStatus("sent");
        setForm({name:"",email:"",subject:"",message:""});
        setTimeout(()=>setStatus("idle"),4000);
      }else{
        setStatus("error");
        setTimeout(()=>setStatus("idle"),4000);
      }
    }catch(err){
      console.error("Web3Forms error:",err);
      setStatus("error");
      setTimeout(()=>setStatus("idle"),4000);
    }
  };

  const links=[
    {icon:"✉",lbl:"Email",val:D.email,href:`mailto:${D.email}`,col:"var(--c1)"},
    {icon:"☎",lbl:"Phone",val:D.phone,href:`tel:${D.phone.replace(/\s/g,"")}`,col:"var(--c2)"},
    {icon:"⌨",lbl:"GitHub",val:"Gopalakrishnan-S29",href:D.github,col:"var(--c4)",ext:true},
    {icon:"◈",lbl:"LinkedIn",val:"gopalakrishnan-s",href:D.linkedin,col:"var(--c5)",ext:true},
  ];

  const btnBg=status==="sent"?"rgba(0,255,136,.14)":status==="error"?"rgba(255,34,85,.14)":status==="sending"?"var(--bg)":"var(--c1)";
  const btnCol=status==="sent"?"var(--c2)":status==="error"?"var(--c3)":status==="sending"?"var(--c1)":"#000";
  const btnTxt=status==="sent"?"✓ Message Sent Successfully":status==="error"?"✗ Failed — Try Again Later":status==="sending"?"Sending...":"Send Message";

  return(
    <section className="sec" id="contact" style={{background:"var(--bg2)"}}>
      <div className="wrap">
        <div className="lbl">Contact</div>
        <h2 style={{fontFamily:"var(--fH)",fontWeight:700,fontSize:"clamp(1.8rem,3.5vw,3rem)",color:"var(--t1)",letterSpacing:".04em",marginBottom:"4rem"}}>
          Let's Work <span style={{color:"var(--c1)"}}>Together.</span>
        </h2>
        <div ref={ref} style={{display:"grid",gridTemplateColumns:"1fr 1.4fr",gap:"4rem",alignItems:"start",opacity:vis?1:0,transition:"opacity .8s"}}>
          <div>
            <p style={{fontFamily:"var(--fM)",fontSize:".78rem",color:"var(--t3)",lineHeight:2,marginBottom:"2.5rem"}}>
              Open to internships, bug bounty collaborations, security research, and any cybersecurity work worth doing. Reach out through any channel below.
            </p>
            <div style={{display:"flex",flexDirection:"column",gap:".4rem"}}>
              {links.map(l=>(
                <a key={l.lbl} href={l.href} target={l.ext?"_blank":undefined} rel={l.ext?"noopener noreferrer":undefined}
                  style={{display:"flex",alignItems:"center",gap:"1rem",padding:".9rem 1.1rem",border:"1px solid var(--b1)",background:"var(--surf)",color:"var(--t2)",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=`${l.col}44`;e.currentTarget.style.color="var(--t1)";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--b1)";e.currentTarget.style.color="var(--t2)";}}>
                  <span style={{color:l.col,fontSize:"1rem",width:18,textAlign:"center",flexShrink:0}}>{l.icon}</span>
                  <div>
                    <div style={{fontFamily:"var(--fM)",fontSize:".52rem",color:"var(--t3)",letterSpacing:".14em",marginBottom:".12rem"}}>{l.lbl.toUpperCase()}</div>
                    <div style={{fontFamily:"var(--fM)",fontSize:".7rem"}}>{l.val}</div>
                  </div>
                </a>
              ))}
            </div>
          </div>

          {/* Form */}
          <div className="term">
            <div className="tbar">
              {["#ff5f56","#ffbd2e","#27c93f"].map((c,i)=><div key={i} className="tdot" style={{background:c}}/>)}
              <span className="ttl">send_message.sh</span>
            </div>
            <div style={{padding:"1.8rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
              {[["name","Name"],["email","Email"],["subject","Subject (optional)"]].map(([k,lbl])=>(
                <div key={k}>
                 
                  <input value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} style={inp}
                    placeholder={`Your ${lbl.toLowerCase()}...`}
                    onFocus={e=>e.target.style.borderColor="var(--c1)"}
                    onBlur={e=>e.target.style.borderColor="var(--b1)"}/>
                </div>
              ))}
              <div>
                <textarea rows={5} value={form.message} onChange={e=>setForm({...form,message:e.target.value})} style={{...inp,resize:"vertical"}}
                  placeholder="Your message..."
                  onFocus={e=>e.target.style.borderColor="var(--c1)"}
                  onBlur={e=>e.target.style.borderColor="var(--b1)"}/>
              </div>
              <button onClick={send} disabled={status==="sending"} style={{padding:".88rem",background:btnBg,color:btnCol,fontFamily:"var(--fH)",fontSize:".7rem",fontWeight:700,letterSpacing:".12em",cursor:"none",border:`1px solid ${status==="sent"?"rgba(0,255,136,.35)":status==="error"?"rgba(255,34,85,.35)":"var(--c1)"}`,transition:"all .25s",width:"100%"}}
                onMouseEnter={e=>{if(status==="idle"){e.currentTarget.style.background="#000";e.currentTarget.style.color="var(--c1)";}}}
                onMouseLeave={e=>{if(status==="idle"){e.currentTarget.style.background="var(--c1)";e.currentTarget.style.color="#000";}}}>
                {btnTxt}
              </button>
             
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ══════════════════════ FOOTER ══════════════════════ */
function Footer(){
  const[ts,setTs]=useState("");
  useEffect(()=>{
    const tick=()=>setTs(new Date().toUTCString().slice(0,25));
    tick();const t=setInterval(tick,1000);return()=>clearInterval(t);
  },[]);
  return(
    <footer style={{padding:"2rem 5%",borderTop:"1px solid var(--b1)",display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:1180,margin:"0 auto",flexWrap:"wrap",gap:"1rem"}}>
      <span style={{fontFamily:"var(--fM)",fontSize:".56rem",color:"var(--t3)"}}>© 2026 Gopalakrishnan S · <span style={{color:"var(--c1)"}}>Coimbatore, India</span></span>
      <span style={{fontFamily:"var(--fM)",fontSize:".54rem",color:"var(--t3)"}}>{ts}<span style={{animation:"blink 1s step-end infinite",color:"var(--c1)",marginLeft:".4rem"}}>▌</span></span>
      <div style={{display:"flex",gap:"1.5rem"}}>
        {["about","projects","contact"].map(l=>(
          <a key={l} href={`#${l}`} style={{fontFamily:"var(--fM)",fontSize:".56rem",color:"var(--t3)",letterSpacing:".08em",textTransform:"uppercase",transition:"color .2s"}}
            onMouseEnter={e=>e.target.style.color="var(--c1)"} onMouseLeave={e=>e.target.style.color="var(--t3)"}>{l}</a>
        ))}
      </div>
    </footer>
  );
}

/* ══════════════════════ APP ══════════════════════ */
function App(){
  const[booted,setBooted]=useState(false);
  const[active,setActive]=useState("hero");
  useCursor();
  useNav(active);
  useEffect(()=>{
    if(!booted)return;
    const ids=["hero","about","skills","experience","projects","certs","contact"];
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);}),{threshold:.22});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[booted]);
  return(
    <>
      {!booted&&<Boot onDone={()=>setBooted(true)}/>}
      <div style={{opacity:booted?1:0,transition:"opacity .7s .1s"}}>
        <Hero/>
        <Ticker/>
        <About/>
        <Skills/>
        <Experience/>
        <Projects/>
        <Certs/>
        <Contact/>
        <Footer/>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
