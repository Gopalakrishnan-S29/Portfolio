/* ── HOOK ── */
function useReveal() {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } }, { threshold:0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, vis];
}

/* ── PARTICLE CANVAS (full-page bright network) ── */
function ParticleCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    const setSize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    setSize();
    window.addEventListener("resize", setSize);

    const N = 180;
    const pts = Array.from({length:N}, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.6,
      vy: (Math.random() - 0.5) * 0.6,
      r: Math.random() * 2.2 + 0.8,
      // some nodes are bright "hub" nodes
      hub: Math.random() < 0.12
    }));

    function tick() {
      canvas.width = canvas.width; // clear
      const W = canvas.width, H = canvas.height;

      for (const p of pts) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      }

      const LINK = 160;
      for (let i = 0; i < N; i++) {
        for (let j = i + 1; j < N; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.hypot(dx, dy);
          if (d < LINK) {
            const alpha = (1 - d / LINK) * 0.65;
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.strokeStyle = `rgba(0,221,179,${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      for (const p of pts) {
        if (p.hub) {
          // glowing hub
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
          grad.addColorStop(0, "rgba(0,221,179,0.9)");
          grad.addColorStop(1, "rgba(0,221,179,0)");
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 5, 0, Math.PI * 2);
          ctx.fillStyle = grad; ctx.fill();
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 1.4, 0, Math.PI * 2);
          ctx.fillStyle = "#00ddb3"; ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(0,221,179,0.85)"; ctx.fill();
        }
      }

      raf = requestAnimationFrame(tick);
    }
    tick();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", setSize); };
  }, []);
  return (
    <canvas ref={canvasRef} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:0}}/>
  );
}

function ContextMenu({ pos, visible, onClose }) {

            style={{padding:".52rem .9rem",fontSize:".76rem",color:T.text,borderRadius:6,display:"flex",alignItems:"center",gap:".6rem",transition:"background .15s,color .15s",cursor:"default"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(0,221,179,.12)";e.currentTarget.style.color=T.teal}}

      )}
    </div>
  );
}

/* ── APP ── */
function App() {
  const [activeSection,setActiveSection] = useState("hero");
  const [ctx,setCtx] = useState({visible:false,pos:{x:0,y:0}});
  const [dark,setDark] = useState(true);

  const toggle = () => {
    setDark(d => {
      const next = !d;
      const theme = next ? DARK : LIGHT;
      Object.assign(T, theme);
      document.body.style.background = theme.bg;
      document.body.style.color = theme.text;
      return next;
    });
  };

  // Apply initial theme
  useEffect(() => { Object.assign(T, DARK); document.body.style.background = DARK.bg; }, []);

  useEffect(() => {
    // A05: Security meta headers
    [
      {httpEquiv:"X-Content-Type-Options",content:"nosniff"},
      {name:"referrer",content:"strict-origin-when-cross-origin"},
      {httpEquiv:"Permissions-Policy",content:"geolocation=(), microphone=(), camera=()"}
    ].forEach(attrs => {
      const sel = attrs.httpEquiv?`meta[http-equiv="${attrs.httpEquiv}"]`:`meta[name="${attrs.name}"]`;
      if (!document.querySelector(sel)) {
        const m = document.createElement("meta");
        Object.entries(attrs).forEach(([k,v])=>m.setAttribute(k==="httpEquiv"?"http-equiv":k,v));
        document.head.appendChild(m);
      }
    });
    // A09: suppress console
    const noop=()=>{};
    ["log","info","debug","trace","warn"].forEach(m=>{try{console[m]=noop}catch(_){}});
    // A04: block devtools hotkeys
    const block = e => {
      if(e.key==="F12"||(e.ctrlKey&&e.shiftKey&&["I","J","C"].includes(e.key))||(e.ctrlKey&&e.key==="U"))
        e.preventDefault();
    };
    document.addEventListener("keydown",block);
    return ()=>document.removeEventListener("keydown",block);
  },[]);

  const handleContextMenu = useCallback(e => {
    e.preventDefault();
    setCtx({visible:true,pos:{x:Math.min(e.clientX,window.innerWidth-195),y:Math.min(e.clientY,window.innerHeight-200)}});
  },[]);

  useEffect(()=>{
    const close=()=>setCtx(c=>({...c,visible:false}));
    document.addEventListener("click",close);
    document.addEventListener("scroll",close);
    return()=>{document.removeEventListener("click",close);document.removeEventListener("scroll",close)};
  },[]);

  useEffect(()=>{
    const ids=["hero","about","skills","experience","projects","certifications","contact"];
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)setActiveSection(e.target.id);}),{threshold:.4});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);

  return (
    <ThemeCtx.Provider value={{dark,toggle}}>
    <div onContextMenu={handleContextMenu} style={{userSelect:"none",WebkitUserSelect:"none",background:T.bg,minHeight:"100vh",transition:"background .3s,color .3s"}}>
      <ContextMenu pos={ctx.pos} visible={ctx.visible} onClose={()=>setCtx(c=>({...c,visible:false}))}/>
      <Navbar active={activeSection}/>
      <Hero/>
      <Ticker/>
      <About/>
      <Skills/>
      <Experience/>
      <Projects/>
      <Certifications/>
      <Contact/>
      <Footer/>
    </div>
    </ThemeCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
